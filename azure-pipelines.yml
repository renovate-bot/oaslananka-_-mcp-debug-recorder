name: mcp-debug-recorder CI - $(Date:yyyyMMdd).$(Rev:r)

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
      - fix/*
  paths:
    exclude:
      - '*.md'
      - docs/**

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  npm_config_cache: $(Pipeline.Workspace)/.npm

stages:
  - stage: Quality
    displayName: Quality Checks
    jobs:
      - job: Validate
        displayName: Lint, test, and build
        strategy:
          matrix:
            node20:
              NODE_VERSION: 20.x
            node24:
              NODE_VERSION: 24.x
        steps:
          - checkout: self

          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: Install Node.js $(NODE_VERSION)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | "$(NODE_VERSION)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)" | "$(NODE_VERSION)"
                npm | "$(Agent.OS)"
              path: $(npm_config_cache)
            displayName: Cache npm

          - script: npm ci
            displayName: Install dependencies (npm ci)

          - script: npm audit --audit-level=moderate
            displayName: Security audit
            continueOnError: true

          - script: npm run lint
            displayName: TypeScript type check and ESLint

          - script: npm run format:check
            displayName: Prettier format check

          - script: npm run test:coverage
            displayName: Unit tests with coverage

          - script: npm run build
            displayName: Build

          - script: npm run test:e2e
            displayName: End-to-end tests

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: test-results/**/*.xml
              failTaskOnFailedTests: true
              testRunTitle: Jest Test Suites ($(NODE_VERSION))
            displayName: Publish test results

          - task: PublishCodeCoverageResults@2
            condition: always()
            inputs:
              summaryFileLocation: $(System.DefaultWorkingDirectory)/coverage/cobertura-coverage.xml
              reportDirectory: $(System.DefaultWorkingDirectory)/coverage/lcov-report
            displayName: Publish coverage
