name: mcp-debug-recorder Publish

trigger: none

pr: none

pool:
  vmImage: ubuntu-latest

stages:
  - stage: PrePublishValidation
    jobs:
      - job: ValidateVersion
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: |
              MCP_VER=$(node -p "require('./mcp.json').version")
              PKG_VER=$(node -p "require('./package.json').version")
              echo "##vso[task.setvariable variable=PACKAGE_VER]$PKG_VER"
              if [ "$MCP_VER" != "$PKG_VER" ]; then
                echo "Version mismatch: mcp.json=$MCP_VER package.json=$PKG_VER"
                exit 1
              fi
            displayName: Check version consistency

  - stage: PublishToNpm
    dependsOn: PrePublishValidation
    jobs:
      - deployment: PublishPackage
        environment: npm-production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: NodeTool@0
                  inputs:
                    versionSpec: '20.x'
                - script: npm install
                  displayName: Install dependencies
                - script: npm run lint
                  displayName: Final lint check
                - script: npm test
                  displayName: Final test run
                - script: npm run build
                  displayName: Production build
                - task: Npm@1
                  displayName: Publish to npm registry via npm-connection
                  inputs:
                    command: publish
                    publishEndpoint: npm-connection

  - stage: CreateAzureDevOpsRelease
    dependsOn: PublishToNpm
    jobs:
      - job: CreateReleaseNotes
        steps:
          - script: echo "Release $(PACKAGE_VER) published"
            displayName: Create release notes

  - stage: FinalizeBuild
    dependsOn: CreateAzureDevOpsRelease
    jobs:
      - job: ReportBuildStatus
        steps:
          - script: echo "Build complete"
            displayName: Report build status
